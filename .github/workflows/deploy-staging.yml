name: Deploy to staging

on:
  push:
    branches:
      - staging

jobs:
  deploy:
    runs-on: self-hosted
    defaults:
      run:
        working-directory: C:\Users\Hello\home_server\staging

    steps:
      - name: Pull latest changes
        run: git pull origin staging

      - name: Restart nginx (if config changed)
        working-directory: C:\Users\Hello\home_server\playground
        run: |
          $changed = git diff HEAD~1 --name-only
          if ($changed -match "nginx/nginx.conf") {
            docker compose restart nginx
            Write-Host "nginx.conf changed — restarted nginx"
          } else {
            Write-Host "No nginx config change — skipping restart"
          }
